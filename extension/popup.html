<!DOCTYPE html>
<html>

<head>
    <title>Web Guardian</title>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background-color: #218838;
        }

        #result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }

        /* Colors for AI results */
        .safe {
            background-color: #d4edda;
            color: #155724;
        }

        .danger {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <h2>Zero-Trust Guardian</h2>
    <p>Scan this page for malicious intent.</p>
    <button id="analyzeBtn">Analyze Page</button>

    <div id="result">
        <span id="scoreText"></span><br>
        <small id="reasonText"></small>
    </div>

    <script src="popup.js"></script>
</body>

</html>
